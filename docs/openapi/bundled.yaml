  /passkeys/authenticate:
    post:
      operationId: postPasskeysAuthenticate
      tags:
        - passkeys
      summary: Generate authentication options
      description: |
        Generate WebAuthn authentication options for signing in with a passkey.
        This is the first step in the passkey authentication flow.

        If `email` is provided, the response will include `allowCredentials`
        restricted to that user's passkeys. If omitted, the browser will prompt
        for a discoverable credential (resident key).

        **Public Access:** No authentication required (for login flow)
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              type: object
              required:
                - data
              properties:
                data:
                  type: object
                  required:
                    - type
                  properties:
                    type:
                      type: string
                      enum:
                        - passkey-authentication
                    attributes:
                      type: object
                      properties:
                        email:
                          type: string
                          format: email
                          description: User's email address (optional — omit for discoverable credentials)
      responses:
        '200':
          description: Raw WebAuthn authentication options (passed directly to navigator.credentials.get())
          content:
            application/json:
              schema:
                type: object
                properties:
                  challenge:
                    type: string
                    description: Base64URL encoded challenge
                  timeout:
                    type: number
                  rpId:
                    type: string
                  allowCredentials:
                    type: array
                    description: Present when email was provided, absent for discoverable credentials
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                          enum:
                            - public-key
                  userVerification:
                    type: string
              example:
                challenge: YXV0aENoYWxsZW5nZUV4YW1wbGU
                timeout: 60000
                rpId: fuelrats.com
                allowCredentials:
                  - id: QWJDMTIzLi4u
                    type: public-key
                userVerification: preferred
        '401':
          description: No passkeys found for user or user doesn't exist
          content:
            application/vnd.api+json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /passkeys/verify:
    post:
      operationId: postPasskeysVerify
      tags:
        - passkeys
      summary: Verify passkey and get bearer token
      description: |
        Complete the passkey authentication by verifying the credential response from the authenticator.
        On success, issues a bearer token bound to the specified OAuth client.
        This is the second step in the passkey authentication flow.

        **Flow:**
        1. `POST /passkeys/authenticate` with email (optional) → get challenge
        2. Browser performs `navigator.credentials.get()` with the challenge
        3. `POST /passkeys/verify` with the response + client credentials (Basic auth) → get bearer token

        **Authentication:** OAuth client authentication required (Basic auth with client_id:client_secret)
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              type: object
              required:
                - data
              properties:
                data:
                  type: object
                  required:
                    - type
                    - attributes
                  properties:
                    type:
                      type: string
                      enum:
                        - passkey-verification
                    attributes:
                      type: object
                      required:
                        - response
                      properties:
                        response:
                          type: object
                          description: WebAuthn credential response from navigator.credentials.get()
                          properties:
                            id:
                              type: string
                              description: Credential ID
                            rawId:
                              type: string
                              description: Base64URL encoded raw credential ID
                            response:
                              type: object
                              properties:
                                clientDataJSON:
                                  type: string
                                  description: Base64URL encoded client data
                                authenticatorData:
                                  type: string
                                  description: Base64URL encoded authenticator data
                                signature:
                                  type: string
                                  description: Base64URL encoded signature
                                userHandle:
                                  type: string
                                  description: Base64URL encoded user handle
                            type:
                              type: string
                              enum:
                                - public-key
      security:
        - basicAuth: []
      responses:
        '200':
          description: Authentication successful, bearer token issued
          content:
            application/json:
              schema:
                type: object
                required:
                  - access_token
                  - token_type
                properties:
                  access_token:
                    type: string
                    description: Bearer token for authenticated API access
                  token_type:
                    type: string
                    enum:
                      - bearer
              example:
                access_token: Xe5qI31OO0014POnVoQpfkLdkWwsYirh
                token_type: bearer
        '401':
          description: Authentication failed
          content:
            application/vnd.api+json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
