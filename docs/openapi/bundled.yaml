                          type: string
                          enum:
                            - public-key
                        alg:
                          type: number
                  timeout:
                    type: number
                  excludeCredentials:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                          enum:
                            - public-key
                  authenticatorSelection:
                    type: object
                    properties:
                      residentKey:
                        type: string
                      userVerification:
                        type: string
              example:
                challenge: Y2hhbGxlbmdlU3RyaW5nRXhhbXBsZQ
                rp:
                  name: The Fuel Rats
                  id: fuelrats.com
                user:
                  id: MWJhZjA0ZmUtYTFhZS00NjAw...
                  name: user@example.com
                  displayName: Rescue Pilot
                pubKeyCredParams:
                  - type: public-key
                    alg: -7
                  - type: public-key
                    alg: -257
                timeout: 60000
                authenticatorSelection:
                  residentKey: preferred
                  userVerification: preferred
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
