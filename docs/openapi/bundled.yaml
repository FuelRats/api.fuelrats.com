      responses:
        '200':
          description: Raw WebAuthn registration options (passed directly to navigator.credentials.create())
          content:
            application/json:
              schema:
                type: object
                properties:
                  challenge:
                    type: string
                    description: Base64URL encoded challenge
                  rp:
                    type: object
                    properties:
                      name:
                        type: string
                      id:
                        type: string
                  user:
                    type: object
                    properties:
                      id:
