  /users/{id}/password:
    put:
      operationId: putUsersIdPassword
      tags:
        - users
      summary: Change user password
      description: |
        Change a user's password. Can be authenticated either with the current password
        or with a passkey response.

        Admins with `users.write` can set another user's password without providing
        the current password (for account recovery). When changing your own password,
        authentication via current password or passkey is always required.

        **Required Permission:** `users.write` OR self-access via `users.write.me`
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              type: object
              required:
                - data
              properties:
                data:
                  type: object
                  required:
                    - type
                    - attributes
                  properties:
                    type:
                      type: string
                      enum:
                        - password-changes
                    attributes:
                      type: object
                      required:
                        - newPassword
                      properties:
                        password:
                          type: string
                          description: Current password (required if not using passkey)
                        totpCode:
                          type: string
                          pattern: ^[0-9]{6}$
                          description: 6-digit TOTP code (required if 2FA is enabled)
                        newPassword:
                          type: string
                          description: New password to set
                          minLength: 8
                        passkeyResponse:
                          type: object
                          description: WebAuthn authentication response (required if not using password)
                          properties:
                            id:
                              type: string
                              description: Base64url-encoded credential ID
                            rawId:
                              type: string
                              format: byte
                              description: Raw credential ID
                            response:
                              type: object
                              properties:
                                authenticatorData:
                                  type: string
                                  format: byte
                                clientDataJSON:
                                  type: string
                                  format: byte
                                signature:
                                  type: string
                                  format: byte
                                userHandle:
                                  type: string
                                  format: byte
                            type:
                              type: string
                              enum:
                                - public-key
            examples:
              password_auth:
                summary: Change password using current password
                value:
                  data:
                    type: password-changes
                    attributes:
                      password: currentPassword123
                      newPassword: newSecurePassword456
              password_2fa_auth:
                summary: Change password using password + 2FA
                value:
                  data:
                    type: password-changes
                    attributes:
                      password: currentPassword123
                      totpCode: '123456'
                      newPassword: newSecurePassword456
              passkey_auth:
                summary: Set password using passkey authentication
                value:
                  data:
                    type: password-changes
                    attributes:
                      newPassword: newSecurePassword456
                      passkeyResponse:
                        id: ALhP1I4BZL3b...
                        rawId: ALhP1I4BZL3b...
                        response:
                          authenticatorData: SZYN5YgO...
                          clientDataJSON: eyJ0eXBlIj...
                          signature: MEUCIQCx...
                        type: public-key
      responses:
        '200':
          description: Password changed successfully
          content:
            application/vnd.api+json:
              schema:
                $ref: '#/components/schemas/UserDocument'
        '400':
          description: Bad Request - Neither password nor passkeyResponse provided
          content:
            application/vnd.api+json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - Invalid password or passkey authentication failed
          content:
            application/vnd.api+json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
