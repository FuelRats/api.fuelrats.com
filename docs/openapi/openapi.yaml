openapi: 3.0.3
info:
  title: FuelRats API
  version: '4.0.0'
  description: |
    The official API for the FuelRats rescue coordination system.
    
    This API follows the [JSON:API specification](https://jsonapi.org/) for consistent resource handling.
    
    ## Authentication

    The API supports user authentication via OAuth tokens only. The token
    is provided in REST requests via the HTTP Authorization header:

    ```
    Authorization: Bearer yourtokenhere
    ```

    For WebSocket connections, provide the token as a query parameter:

    ```
    wss://api.fuelrats.com/?bearer=yourtokenhere
    ```

    If you cannot set HTTP headers, you may also provide a `bearer` query
    parameter on REST requests.

    ## Creating an OAuth Client

    To create an OAuth client you must have the `clients.write` permission
    on your Fuel Rats account (automatically granted to tech rats and
    administrators). Navigate to the
    [developer area](https://fuelrats.com/profile/developer), provide the
    name of your client and your redirect URI.

    When you create your client you will receive a **client ID** and a
    **client secret**. You **must** store these safely — they cannot be
    recovered if lost. If you lose your credentials and request a reset,
    all existing copies of your application will stop working.

    ## Supported Grant Types

    ### Authorization Code (Recommended)

    The most secure method. Use when you can hide the client secret (native
    apps, server-side code). **Do not** use in client-side web applications
    where the secret would be visible in source code.

    **Flow:**

    1. Open the fuelrats.com authorisation page in the user's browser
    2. User approves or rejects the request
    3. Your application receives an **authorisation code** via redirect
    4. Exchange the code for an **access token** using your client credentials

    #### Authorisation URL

    ```
    https://fuelrats.com/authorize?response_type=code&client_id=YOUR_ID&scope=SCOPES&redirect_uri=YOUR_URI&state=YOUR_STATE
    ```

    | Parameter | Description |
    |-----------|-------------|
    | `response_type` | Must be `code` |
    | `client_id` | Your OAuth client ID |
    | `scope` | Space-separated list of permissions |
    | `redirect_uri` | Where to redirect after approval. Set to `DISPLAY` to show the code on-screen instead |
    | `state` | An opaque value returned in the callback to prevent CSRF |

    **Redirect options for different application types:**
    - **Website:** Redirect to your web page
    - **Native app with URL scheme:** `myapp://authorization`
    - **Native app without URL scheme:** Temporary local server `http://localhost:8080/authorization`
    - **GUI app:** Hosted web view, intercept the redirect
    - **No redirect possible:** Set `redirect_uri=DISPLAY` and have the user copy the code

    #### Authorisation Callback

    **Success:** `https://yourapp.com/callback?code=AUTH_CODE&state=YOUR_STATE`

    **Failure:** `https://yourapp.com/callback?error=ERROR_CODE&error_description=MESSAGE&state=YOUR_STATE`

    #### Token Exchange

    `POST https://api.fuelrats.com/oauth2/token` with Basic auth (client_id:client_secret).

    Body (`application/x-www-form-urlencoded`):

    | Key | Value |
    |-----|-------|
    | `grant_type` | `authorization_code` |
    | `code` | The authorisation code from the callback |
    | `redirect_uri` | Must match the URI used in the authorisation step |

    **Success response (200):**

    ```json
    { "access_token": "...", "token_type": "bearer" }
    ```

    **Error response (400):**

    ```json
    { "error": "error_code", "error_description": "Human readable message" }
    ```

    ### Implicit Grant

    For client-side web applications where the secret cannot be hidden.
    Less secure than Authorization Code — use that instead if possible.

    Same authorisation step as Authorization Code with these differences:
    - `response_type` must be `token` (not `code`)
    - `redirect_uri` **must** match the one registered with your client
    - Only works with HTTP/HTTPS redirects to valid web domains

    **Success callback:**
    `https://yourapp.com/callback?access_token=TOKEN&token_type=bearer&scope=SCOPES&state=YOUR_STATE`

    ### Resource Owner Password Credentials (ROPC)

    **Only available to first-party Fuel Rats applications.** Non-whitelisted
    clients will receive a 403.

    `POST https://api.fuelrats.com/oauth2/token` with Basic auth (client_id:client_secret).

    Required headers:

    | Header | Description |
    |--------|-------------|
    | `User-Agent` | Description of the user agent |
    | `X-Fingerprint` | Unique device fingerprint |

    Body (`application/x-www-form-urlencoded`):

    | Key | Value |
    |-----|-------|
    | `grant_type` | `password` |
    | `username` | User's email address |
    | `password` | User's password |

    **Success response (200):**

    ```json
    { "access_token": "...", "token_type": "bearer" }
    ```

    ### Passkey/WebAuthn Authentication

    Passwordless authentication using FIDO2/WebAuthn credentials.

    **Flow:**

    1. `POST /passkeys/authenticate` with optional `email` → receive WebAuthn challenge
    2. Browser performs `navigator.credentials.get()` with the challenge
    3. `POST /passkeys/verify` with the WebAuthn response, authenticated with
       client credentials (Basic auth) → receive bearer token

    If `email` is omitted in step 1, the browser will prompt for a
    discoverable credential (resident key).

    ### Token Revocation

    `POST /oauth2/revoke` with Basic auth (client_id:client_secret).

    Body: `token=THE_TOKEN_TO_REVOKE`

    ### WebSocket Authentication

    Connect to `wss://api.fuelrats.com/` with protocol `FR-JSONAPI-WS`:

    ```
    wss://api.fuelrats.com/?bearer=YOUR_TOKEN
    ```
    
    ## Permission Scopes
    
    API permissions follow the format: `resource.read/write(.me)`
    
    - **resource**: Plural resource type (users, rats, rescues, etc.)
    - **read**: View records
    - **write**: Create/update/delete records  
    - **.me**: Restrict to user's own associated records only
    
    **Examples:**
    - `rescues.read.me` - View only your assigned rescues
    - `rats.write` - Modify any commander record
    - `users.read` - View any user information
    
    ## Filtering & Query Parameters
    
    Most list endpoints support advanced filtering using JSON query objects:
    
    ### Filter Operators:
    - **Comparison**: `gt`, `gte`, `lt`, `lte`, `eq`, `ne`
    - **Text**: `like`, `iLike`, `substring`, `startsWith`, `regexp`
    - **Logical**: `and`, `or`, `not`
    - **Arrays**: `contains`, `overlap`, `contained`
    
    ### Example Filter:
    ```json
    {
      "and": [
        { "name": { "startsWith": "Commander" } },
        { "rescueCount": { "gt": 10 } }
      ]
    }
    ```
    
    URL encode the filter object and pass as `filter` query parameter.
    
    ## WebSocket Real-time API
    
    Connect to `wss://api.fuelrats.com/` with protocol `FR-JSONAPI-WS`:
    
    ### Request Format:
    ```javascript
    [state, endpoint, query, body]
    ```
    
    ### Response Format:
    ```javascript
    [state, status, body]
    ```
    
    ### Event Subscription:
    Subscribe to real-time events by sending:
    ```javascript
    ["subscribe", "events", "subscribe", {}]
    ```
    
    Events follow format: `[event, sender, resourceId, data]`
    
    ## Error Handling
    
    All errors follow JSON:API error object format with additional metadata:
    
    ```json
    {
      "errors": [{
        "id": "unique-error-id",
        "code": "error_code", 
        "status": "400",
        "title": "Error Title",
        "detail": "Detailed error description",
        "source": {
          "pointer": "/data/attributes/field"
        }
      }]
    }
    ```
    
    Use the `id` field for error tracking and `code` field for programmatic error handling.
    
