# Epics API endpoints

epics:
  get:
    tags: [epics]
    summary: List epics
    description: Search and list epic rescue nominations.
    security:
      - bearerAuth: []
    parameters:
      - $ref: '../components/parameters.yaml#/PageOffset'
      - $ref: '../components/parameters.yaml#/PageLimit'
      - $ref: '../components/parameters.yaml#/Sort'
      - $ref: '../components/parameters.yaml#/Include'
      - $ref: '../components/parameters.yaml#/Fields'
      - $ref: '../components/parameters.yaml#/Filter'
    responses:
      '200':
        description: List of epics
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
  post:
    tags: [epics]
    summary: Create epic
    description: Create a new epic rescue nomination.
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/vnd.api+json:
          schema:
            type: object
    responses:
      '201':
        description: Epic created
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'

epics_by_id:
  get:
    tags: [epics]
    summary: Get epic by ID
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Epic details
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '404':
        $ref: '../components/responses.yaml#/NotFound'
  put:
    tags: [epics]
    summary: Update epic
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Epic updated
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '404':
        $ref: '../components/responses.yaml#/NotFound'
  delete:
    tags: [epics]
    summary: Delete epic
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '204':
        description: Epic deleted
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '404':
        $ref: '../components/responses.yaml#/NotFound'

