# Web Push Notification API endpoints

web_push_subscribe:
  post:
    tags: [web-push]
    summary: Subscribe to web push notifications
    description: |
      Subscribe to receive web push notifications for rescue alerts and system events.

      Behaviour is **upsert by endpoint** — re-subscribing from the same browser
      (e.g. after the service worker rotates keys) updates the existing row
      rather than creating duplicates.
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [endpoint, keys]
            properties:
              endpoint:
                type: string
                format: uri
                description: Push service endpoint URL from the browser
              expirationTime:
                type: integer
                nullable: true
                description: Optional expiration time (Unix timestamp, ms)
              keys:
                type: object
                required: [auth, p256dh]
                properties:
                  auth:
                    type: string
                  p256dh:
                    type: string
              pc:
                type: boolean
                default: true
                description: Receive PC platform alerts
              xb:
                type: boolean
                default: true
                description: Receive Xbox platform alerts
              ps:
                type: boolean
                default: true
                description: Receive PlayStation platform alerts
              odyssey:
                type: boolean
                default: true
                description: Receive Odyssey expansion alerts
    responses:
      '204':
        description: Subscription created or updated
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '422':
        $ref: '../components/responses.yaml#/UnprocessableEntity'
  delete:
    tags: [web-push]
    summary: Unsubscribe the current device by endpoint
    description: |
      Delete the subscription for the given endpoint belonging to the
      authenticated user. Typically called by the service worker when it
      learns its subscription is no longer valid.
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [endpoint]
            properties:
              endpoint:
                type: string
                format: uri
    responses:
      '204':
        description: Subscription removed (or did not exist)
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '422':
        $ref: '../components/responses.yaml#/UnprocessableEntity'

users_web_push_subscriptions:
  get:
    tags: [web-push]
    summary: List a user's web push subscriptions
    description: |
      Returns the authenticated user's subscriptions. Cryptographic keys
      (auth, p256dh) are not exposed in the response.
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: List of subscriptions
        content:
          application/vnd.api+json:
            schema:
              type: object
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '404':
        $ref: '../components/responses.yaml#/NotFound'

users_web_push_subscription:
  patch:
    tags: [web-push]
    summary: Update a subscription's platform/expansion filters
    description: |
      Toggle which kinds of rescue alerts this subscription receives.
      Only `pc`, `xb`, `ps`, and `odyssey` can be changed.
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: subscriptionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              pc: { type: boolean }
              xb: { type: boolean }
              ps: { type: boolean }
              odyssey: { type: boolean }
    responses:
      '200':
        description: Subscription updated
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '404':
        $ref: '../components/responses.yaml#/NotFound'
  delete:
    tags: [web-push]
    summary: Delete a subscription by id
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: subscriptionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '204':
        description: Subscription removed
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '404':
        $ref: '../components/responses.yaml#/NotFound'

alerts_broadcast:
  post:
    tags: [web-push]
    summary: Broadcast a push notification to all subscribers
    description: |
      Sends a structured push notification to every subscribed device.

      **Required Permission:** `twitter.write` (held by dispatch/admin roles)
    security:
      - bearerAuth: [twitter.write]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [title, body]
            properties:
              title:
                type: string
                description: Notification title
              body:
                type: string
                description: Notification body text
              icon:
                type: string
                format: uri
                description: Optional notification icon URL
              tag:
                type: string
                description: Optional tag — replaces existing notifications with the same tag
              type:
                type: string
                description: Optional discriminator for the service worker (default "broadcast")
              data:
                type: object
                additionalProperties: true
                description: Optional extra data passed to the service worker
              TTL:
                type: integer
                default: 86400
                description: Push service TTL in seconds (default 24h)
              urgency:
                type: string
                enum: [very-low, low, normal, high]
                default: normal
              topic:
                type: string
                description: Optional collapse key on the push service
    responses:
      '204':
        description: Broadcast queued for delivery
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '422':
        $ref: '../components/responses.yaml#/UnprocessableEntity'

users_alerts:
  post:
    tags: [web-push]
    summary: Send a push notification to one user's devices
    description: |
      Users may send to themselves without extra permission. Sending to a
      different user requires `twitter.write`.

      Default TTL is 1h (shorter than the broadcast endpoint since per-user
      notifications are typically more time-sensitive).
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [title, body]
            properties:
              title: { type: string }
              body: { type: string }
              icon: { type: string, format: uri }
              tag: { type: string }
              type: { type: string }
              data:
                type: object
                additionalProperties: true
              TTL:
                type: integer
                default: 3600
              urgency:
                type: string
                enum: [very-low, low, normal, high]
                default: normal
              topic: { type: string }
    responses:
      '204':
        description: Alert queued for delivery
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '404':
        $ref: '../components/responses.yaml#/NotFound'
      '422':
        $ref: '../components/responses.yaml#/UnprocessableEntity'
