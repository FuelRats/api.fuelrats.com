# SSO endpoints

sso_jira:
  get:
    tags: [sso]
    summary: Jira SSO login
    description: Single sign-on endpoint for Jira integration.
    security:
      - bearerAuth: []
    responses:
      '200':
        description: SSO credentials generated
      '302':
        description: Redirect to Jira with SSO credentials
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'

